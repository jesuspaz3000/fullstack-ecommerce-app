server:
  port: 8080
  servlet:
    context-path: /api
  forward-headers-strategy: framework

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  application:
    name: store-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/store_db}
    username: postgres
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

jwt:
  secret: ${JWT_SECRET:123fa9ec6574f680ab5bce5259071c014148faebf537ccc3375fe603a428964f}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000
  issuer: ${JWT_ISSUER:store-backend}

# Cookies httpOnly (access_token, refresh_token en /api; auth_session en / para el middleware del front)
app:
  auth:
    cookie:
      secure: ${AUTH_COOKIE_SECURE:false}
      same-site: ${AUTH_COOKIE_SAMESITE:Lax}
      domain: ${AUTH_COOKIE_DOMAIN:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
    filter: true

file:
  upload-dir: uploads

